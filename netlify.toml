[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Local dev: `npm run dev:netlify` starts netlify dev on :8888
# which proxies the Vite frontend on :5173 and serves functions
[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"
  autoLaunch = false

# Serve functions at their natural path (no rewrite needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
